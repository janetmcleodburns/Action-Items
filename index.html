<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Action Items" />
  <meta name="theme-color" content="#0e0e12" />
  <title>Action Items</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --bg2: #13131a;
      --bg3: #16161e;
      --border: #1e1e28;
      --border2: #2a2a38;
      --text: #e8e6e0;
      --text-dim: #3a3a50;
      --text-mid: #6668a0;
      --text-muted: #555560;
      --accent: #4a4a70;
      --accent2: #8888b0;
      --red: #ff4d4d;
      --amber: #ffaa00;
      --green: #00cc88;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    #app {
      min-height: 100dvh;
      padding-top: calc(var(--safe-top) + 32px);
      padding-bottom: calc(var(--safe-bottom) + 40px);
      padding-left: 20px;
      padding-right: 20px;
    }

    .inner { max-width: 580px; margin: 0 auto; }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .eyebrow {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 8vw, 38px);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .subtitle {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
      margin-bottom: 24px;
    }
    .subtitle-text { font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; white-space: nowrap; }
    .progress-bar { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 1px; transition: width 0.4s ease; }

    /* Add panel */
    .add-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 24px;
    }
    .add-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 10px;
      -webkit-appearance: none;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--text-dim); }

    .add-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .priority-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 7px 10px;
      transition: all 0.15s;
      text-transform: uppercase;
      color: var(--text-mid);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .priority-btn.sel-high { background: #ff4d4d22; border-color: var(--red); color: #ff8080; }
    .priority-btn.sel-medium { background: #ffaa0022; border-color: var(--amber); color: #ffcc60; }
    .priority-btn.sel-low { background: #00cc8822; border-color: var(--green); color: #44ddaa; }

    .date-input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text-mid);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 7px 10px;
      outline: none;
      transition: border 0.2s;
      color-scheme: dark;
      max-width: 130px;
      -webkit-appearance: none;
    }
    .date-input:focus { border-color: var(--accent); }

    .add-btn {
      margin-left: auto;
      background: var(--text);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 18px;
      color: var(--bg);
      transition: all 0.15s;
      letter-spacing: 0.05em;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { opacity: 0.8; transform: scale(0.97); }

    /* Filters */
    .filters { display: flex; gap: 4px; margin-bottom: 8px; }
    .filter-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
      padding: 6px 13px; border-radius: 20px; text-transform: uppercase; transition: all 0.2s;
      color: var(--text-muted);
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active-filter { background: var(--border); color: var(--text); }
    .filter-count { opacity: 0.55; }

    hr.rule { border: none; border-top: 1px solid var(--border); margin: 0 0 0; }

    /* List */
    .list { padding-top: 2px; }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 0;
      border-bottom: 1px solid var(--bg3);
      animation: fadeIn 0.22s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }

    .priority-dot {
      width: 7px; height: 7px; min-width: 7px;
      border-radius: 50%; margin-top: 6px;
    }

    .check-btn {
      width: 20px; height: 20px; min-width: 20px;
      border-radius: 5px; margin-top: 1px;
      border: 1.5px solid var(--text-dim);
      background: none; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .check-btn.done-check { background: var(--accent); border-color: var(--accent); }

    .item-body { flex: 1; min-width: 0; }
    .item-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
    .item-text.done-text { color: var(--accent); text-decoration: line-through; }

    .edit-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--accent);
      border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 14px; padding: 4px 8px; outline: none;
    }

    .due-chip { font-size: 10px; color: var(--text-mid); letter-spacing: 0.05em; margin-top: 3px; }
    .due-chip.overdue { color: #ff7777; }

    .item-actions { display: flex; gap: 2px; margin-top: 2px; }
    .action-btn {
      background: none; border: none; cursor: pointer; padding: 3px 7px;
      font-size: 11px; color: var(--text-dim); transition: color 0.15s;
      font-family: 'DM Mono', monospace;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .action-btn.del:active { color: #ff6666; }

    /* Empty */
    .empty-state { text-align: center; padding: 56px 20px; color: #2a2a40; font-size: 13px; letter-spacing: 0.05em; }
    .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.35; }

    /* Email button */
    .email-btn {
      background: none; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
      padding: 7px 12px; color: var(--text-mid); transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 5px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .email-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .email-btn.sent { border-color: var(--green) !important; color: var(--green) !important; }
    .email-btn.err { border-color: var(--red) !important; color: #ff8888 !important; }
    .email-btn:not(:disabled):active { background: var(--bg3); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }

    .error-msg { font-size: 11px; color: #ff9999; text-align: right; margin-bottom: 6px; }
  </style>
</head>
<body>
<div id="app">
  <div class="inner">
    <div class="topbar">
      <span class="eyebrow">Your</span>
      <button class="email-btn" id="emailBtn" onclick="handleSendEmail()">
        <span>✉</span> Email to myself
      </button>
    </div>
    <div id="emailError" class="error-msg" style="display:none"></div>
    <h1>Action Items</h1>
    <div class="subtitle">
      <span class="subtitle-text" id="subtitleText">0 remaining · 0 done</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- Add panel -->
    <div class="add-panel">
      <input class="add-input" id="addInput" placeholder="Add an action item…" onkeydown="if(event.key==='Enter')addItem()" />
      <div class="add-controls">
        <button class="priority-btn sel-medium" id="pb-high" onclick="setPriority('high')">High</button>
        <button class="priority-btn sel-medium" id="pb-medium" onclick="setPriority('medium')">Med</button>
        <button class="priority-btn sel-medium" id="pb-low" onclick="setPriority('low')">Low</button>
        <input type="date" class="date-input" id="dateInput" />
        <button class="add-btn" onclick="addItem()">+ Add</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn" id="fb-all" onclick="setFilter('all')">All <span class="filter-count" id="fc-all"></span></button>
      <button class="filter-btn active-filter" id="fb-active" onclick="setFilter('active')">Active <span class="filter-count" id="fc-active"></span></button>
      <button class="filter-btn" id="fb-done" onclick="setFilter('done')">Done <span class="filter-count" id="fc-done"></span></button>
    </div>
    <hr class="rule" />
    <div class="list" id="list"></div>
  </div>
</div>

<script>
  const PRIORITY_COLORS = {
    high: { dot: '#ff4d4d', shadow: '#ff4d4d66' },
    medium: { dot: '#ffaa00', shadow: '#ffaa0066' },
    low: { dot: '#00cc88', shadow: '#00cc8866' },
  };

  let items = [];
  let filter = 'active';
  let priority = 'medium';
  let editId = null;

  // Storage
  function load() {
    try { items = JSON.parse(localStorage.getItem('action-items') || '[]'); } catch { items = []; }
  }
  function save() {
    try { localStorage.setItem('action-items', JSON.stringify(items)); } catch {}
  }

  function generateId() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  // Priority selection
  function setPriority(p) {
    priority = p;
    ['high','medium','low'].forEach(x => {
      const btn = document.getElementById('pb-' + x);
      btn.className = 'priority-btn' + (x === p ? ' sel-' + x : '');
    });
  }

  // Filter
  function setFilter(f) {
    filter = f;
    ['all','active','done'].forEach(x => {
      document.getElementById('fb-' + x).className = 'filter-btn' + (x === f ? ' active-filter' : '');
    });
    render();
  }

  // Add
  function addItem() {
    const input = document.getElementById('addInput');
    const text = input.value.trim();
    if (!text) return;
    const dueDate = document.getElementById('dateInput').value;
    items.unshift({ id: generateId(), text, priority, done: false, dueDate, createdAt: Date.now() });
    input.value = '';
    document.getElementById('dateInput').value = '';
    save();
    render();
    input.focus();
  }

  // Toggle done
  function toggleDone(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.done = !item.done; save(); render(); }
  }

  // Delete
  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save(); render();
  }

  // Edit
  function startEdit(id) {
    editId = id;
    render();
    const inp = document.getElementById('edit-' + id);
    if (inp) { inp.focus(); inp.select(); }
  }

  function saveEdit(id) {
    const inp = document.getElementById('edit-' + id);
    if (!inp) return;
    const text = inp.value.trim();
    if (text) { const item = items.find(i => i.id === id); if (item) item.text = text; }
    editId = null;
    save(); render();
  }

  function editKeydown(e, id) {
    if (e.key === 'Enter') saveEdit(id);
    if (e.key === 'Escape') { editId = null; render(); }
  }

  // Render
  function render() {
    const today = new Date().toISOString().slice(0, 10);
    const pOrder = { high: 0, medium: 1, low: 2 };

    const all = items.length;
    const done = items.filter(i => i.done).length;
    const active = all - done;

    document.getElementById('subtitleText').textContent = `${active} remaining · ${done} done`;
    document.getElementById('progressFill').style.width = all ? `${(done / all) * 100}%` : '0%';
    document.getElementById('fc-all').textContent = all ? `(${all})` : '';
    document.getElementById('fc-active').textContent = active ? `(${active})` : '';
    document.getElementById('fc-done').textContent = done ? `(${done})` : '';

    const visible = items
      .filter(i => filter === 'active' ? !i.done : filter === 'done' ? i.done : true)
      .sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return pOrder[a.priority] - pOrder[b.priority];
      });

    const list = document.getElementById('list');
    if (visible.length === 0) {
      const msg = filter === 'done' ? 'Nothing completed yet.' : filter === 'active' ? 'All clear — nothing pending.' : 'No items yet.';
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">◇</div><div>${msg}</div></div>`;
      return;
    }

    list.innerHTML = visible.map(item => {
      const pc = PRIORITY_COLORS[item.priority];
      const isOverdue = item.dueDate && !item.done && item.dueDate < today;
      const checkClass = item.done ? 'check-btn done-check' : 'check-btn';
      const checkmark = item.done ? `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#e8e6e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : '';
      const textContent = editId === item.id
        ? `<input class="edit-input" id="edit-${item.id}" value="${item.text.replace(/"/g, '&quot;')}" onkeydown="editKeydown(event,'${item.id}')" onblur="saveEdit('${item.id}')" />`
        : `<div class="item-text ${item.done ? 'done-text' : ''}" ondblclick="${!item.done ? `startEdit('${item.id}')` : ''}">${escHtml(item.text)}</div>`;
      const dueHtml = item.dueDate
        ? `<div class="due-chip ${isOverdue ? 'overdue' : ''}">${isOverdue ? '⚠ ' : ''}Due ${item.dueDate}</div>` : '';
      const editBtn = !item.done ? `<button class="action-btn" onclick="startEdit('${item.id}')">edit</button>` : '';
      return `
        <div class="item-row">
          <div class="priority-dot" style="background:${pc.dot};box-shadow:0 0 5px ${pc.shadow}"></div>
          <button class="${checkClass}" onclick="toggleDone('${item.id}')">${checkmark}</button>
          <div class="item-body">${textContent}${dueHtml}</div>
          <div class="item-actions">${editBtn}<button class="action-btn del" onclick="deleteItem('${item.id}')">✕</button></div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Email via Outlook
  async function handleSendEmail() {
    const btn = document.getElementById('emailBtn');
    const errEl = document.getElementById('emailError');
    if (items.length === 0) return;

    btn.disabled = true;
    btn.className = 'email-btn';
    btn.innerHTML = '<span class="spin">⟳</span> Sending…';
    errEl.style.display = 'none';

    try {
      const active = items.filter(i => !i.done);
      const done = items.filter(i => i.done);
      const emoji = { high: '🔴', medium: '🟡', low: '🟢' };
      const fmt = list => list.map(i =>
        `  ${emoji[i.priority]} [${i.priority.toUpperCase()}] ${i.text}${i.dueDate ? ' — Due: ' + i.dueDate : ''}`
      ).join('\n');
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const body =
        `Action Items Summary — ${today}\n\n` +
        `📋 ACTIVE (${active.length})\n${'─'.repeat(40)}\n${active.length ? fmt(active) : '  All clear!'}\n\n` +
        (done.length ? `✅ COMPLETED (${done.length})\n${'─'.repeat(40)}\n${fmt(done)}\n\n` : '') +
        `─────────────────────────────────────────\nSent from your Action Items app`;

      const prompt = `You are an email-sending assistant with access to Microsoft 365 Outlook.
Send an email to the currently signed-in user (me) with:
- Subject: "Action Items — ${today}"
- Body (plain text, preserve formatting exactly):
${body}

Use the available Outlook send email tool. Just send it directly.`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          mcp_servers: [{ type: 'url', url: 'https://microsoft365.mcp.claude.com/mcp', name: 'microsoft365' }],
          messages: [{ role: 'user', content: prompt }],
        }),
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || 'API error');

      const toolCalls = data.content.filter(b => b.type === 'mcp_tool_use');
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join(' ').toLowerCase();
      if (toolCalls.length === 0 && !text.includes('sent')) {
        throw new Error('Could not send — make sure Microsoft 365 is connected in Claude.');
      }

      btn.className = 'email-btn sent';
      btn.innerHTML = '✓ Sent to Outlook!';
      setTimeout(() => { btn.disabled = false; btn.className = 'email-btn'; btn.innerHTML = '<span>✉</span> Email to myself'; }, 3000);
    } catch (e) {
      btn.className = 'email-btn err';
      btn.innerHTML = '✕ Failed';
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      setTimeout(() => {
        btn.disabled = false; btn.className = 'email-btn'; btn.innerHTML = '<span>✉</span> Email to myself';
        errEl.style.display = 'none';
      }, 6000);
    }
  }

  // Init
  setPriority('medium');
  load();
  render();
</script>
</body>
</html>
